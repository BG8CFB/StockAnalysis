# 开发环境 Docker Compose 配置
services:
  # 前端开发服务器
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: stock-analysis-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=
      - VITE_API_TARGET=http://backend:8000
      - TZ=Asia/Shanghai
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - stock-analysis-network
    restart: unless-stopped

  # Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: stock-analysis-backend-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - ENVIRONMENT=development
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DATABASE=stock_analysis
      - DATABASE_NAME=stock_analysis
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-for-testing-only-not-for-production-at-least-64-characters-long-for-security-check
      - DEBUG=true
      - CORS_ORIGINS=http://localhost:5173,http://localhost:8000
      - LOG_LEVEL=DEBUG
      - DATA_SOURCE_RATE_LIMIT_WINDOW=60
      - DATA_SOURCE_RATE_LIMIT_MAX_REQUESTS=1
      - DATA_SOURCE_MAX_FAILURES=3
      - DATA_SOURCE_HEALTH_CHECK_INTERVAL=300
      - MONGODB_BULK_WRITE_BATCH_SIZE=1000
      - TZ=Asia/Shanghai
    depends_on:
      - mongodb
      - redis
    networks:
      - stock-analysis-network
    restart: unless-stopped

  # MongoDB
  mongodb:
    image: mongo:latest
    container_name: stock-analysis-mongodb-dev
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init:/docker-entrypoint-initdb.d:ro
    environment:
      - MONGO_INITDB_DATABASE=stock_analysis
      - TZ=Asia/Shanghai
    networks:
      - stock-analysis-network
    restart: unless-stopped

  # Redis
  redis:
    image: redis:latest
    container_name: stock-analysis-redis-dev
    ports:
      - "6379:6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    environment:
      - TZ=Asia/Shanghai
    networks:
      - stock-analysis-network
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:

networks:
  stock-analysis-network:
    driver: bridge
