# 本地开发环境配置 - 仅数据库和Redis容器
# 前后端在终端直接运行，方便查看日志

services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: stock-analysis-mongodb-local
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init:/docker-entrypoint-initdb.d:ro
    environment:
      - MONGO_INITDB_DATABASE=stock_analysis
      - TZ=Asia/Shanghai
    networks:
      - stock-analysis-network
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: stock-analysis-redis-local
    ports:
      - "6379:6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    environment:
      - TZ=Asia/Shanghai
    networks:
      - stock-analysis-network
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:

networks:
  stock-analysis-network:
    driver: bridge
