<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Logo 背景框 -->
  <rect width="120" height="40" rx="8" fill="url(#bgGradient)"/>

  <!-- Logo 图标 -->
  <g transform="translate(8, 8)">
    <!-- 股票图表图标 -->
    <path d="M4 20 L8 16 L12 18 L16 12 L20 14 L24 8 L24 20 L4 20 Z"
          stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 数据点 -->
    <circle cx="8" cy="16" r="2" fill="white"/>
    <circle cx="12" cy="18" r="2" fill="white"/>
    <circle cx="16" cy="12" r="2" fill="white"/>
    <circle cx="20" cy="14" r="2" fill="white"/>
    <circle cx="24" cy="8" r="2" fill="white"/>
  </g>

  <!-- Logo 文字 -->
  <text x="40" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="url(#textGradient)">
    TradingAgents
  </text>
</svg>