<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingAgents-CN - 系统状态</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 40px;
            max-width: 800px;
            width: 90%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 120px;
            height: 40px;
            margin: 0 auto 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            border-left: 4px solid #28a745;
        }

        .status-card.error {
            border-left-color: #dc3545;
        }

        .status-card.warning {
            border-left-color: #ffc107;
        }

        .status-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .status-value {
            font-size: 14px;
            color: #666;
        }

        .actions {
            text-align: center;
            margin-top: 30px;
        }

        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin: 0 10px;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: #0056b3;
        }

        .btn.success {
            background: #28a745;
        }

        .btn.success:hover {
            background: #1e7e34;
        }

        .system-info {
            background: #e9ecef;
            border-radius: 6px;
            padding: 20px;
            margin-top: 30px;
        }

        .system-info h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .feature-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .feature-item {
            background: white;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #007bff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/logo.svg" alt="TradingAgents-CN Logo" class="logo" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIwIiBoZWlnaHQ9IjQwIiB2aWV3Qm94PSIwIDAgMTIwIDQwIiBmaWxsPSJub25lIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPgogIDxyZWN0IHdpZHRoPSIxMjAiIGhlaWdodD0iNDAiIHJ4PSI4IiBmaWxsPSIjNjY3ZWVhIi8+CiAgPHRleHQgeD0iNjAiIHk9IjI1IiBmb250LWZhbWlseT0iQXJpYWwsIHNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTIiIGZvbnQtd2VpZ2h0PSJib2xkIiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+VHJhZGluZ0FnZW50czwvdGV4dD4KPC9zdmc+'">
            <h1>TradingAgents-CN</h1>
            <p class="subtitle">模块化单体架构的股票分析智能体系统</p>
        </div>

        <div class="status-grid">
            <div class="status-card" id="backend-status">
                <div class="status-title">后端服务</div>
                <div class="status-value">检查中...</div>
            </div>
            <div class="status-card" id="frontend-status">
                <div class="status-title">前端服务</div>
                <div class="status-value">运行正常</div>
            </div>
            <div class="status-card" id="api-status">
                <div class="status-title">API接口</div>
                <div class="status-value">检查中...</div>
            </div>
            <div class="status-card" id="docs-status">
                <div class="status-title">API文档</div>
                <div class="status-value">检查中...</div>
            </div>
        </div>

        <div class="actions">
            <a href="http://localhost:8000/docs" target="_blank" class="btn">查看API文档</a>
            <a href="http://localhost:8000/api/dashboard/summary" target="_blank" class="btn success">测试API</a>
            <button onclick="checkAllStatus()" class="btn">重新检查状态</button>
        </div>

        <div class="system-info">
            <h3>系统特性</h3>
            <div class="feature-list">
                <div class="feature-item">🧩 模块化架构 - 即插即用的模块系统</div>
                <div class="feature-item">⚡ 事件驱动 - 模块间解耦通信</div>
                <div class="feature-item">🔒 安全认证 - JWT认证和权限管理</div>
                <div class="feature-item">📱 响应式设计 - 现代化用户界面</div>
                <div class="feature-item">🚀 高性能 - FastAPI + Vue3</div>
                <div class="feature-item">📊 实时数据 - 市场数据分析</div>
            </div>
        </div>
    </div>

    <script>
        async function checkBackend() {
            try {
                const response = await fetch('http://localhost:8000/health');
                const data = await response.json();
                updateStatus('backend-status', '运行正常', false);
                return true;
            } catch (error) {
                updateStatus('backend-status', '无法连接', true);
                return false;
            }
        }

        async function checkAPI() {
            try {
                const response = await fetch('http://localhost:8000/api/dashboard/summary');
                if (response.ok) {
                    updateStatus('api-status', '运行正常', false);
                    return true;
                } else {
                    updateStatus('api-status', '响应异常', true);
                    return false;
                }
            } catch (error) {
                updateStatus('api-status', '无法连接', true);
                return false;
            }
        }

        async function checkDocs() {
            try {
                const response = await fetch('http://localhost:8000/docs');
                if (response.ok) {
                    updateStatus('docs-status', '可访问', false);
                    return true;
                } else {
                    updateStatus('docs-status', '无法访问', true);
                    return false;
                }
            } catch (error) {
                updateStatus('docs-status', '无法访问', true);
                return false;
            }
        }

        function updateStatus(id, status, isError) {
            const element = document.getElementById(id);
            const statusValue = element.querySelector('.status-value');
            statusValue.textContent = status;

            if (isError) {
                element.classList.add('error');
                element.classList.remove('warning');
            } else {
                element.classList.remove('error', 'warning');
            }
        }

        async function checkAllStatus() {
            await checkBackend();
            await checkAPI();
            await checkDocs();
        }

        // 页面加载时自动检查
        document.addEventListener('DOMContentLoaded', function() {
            checkAllStatus();
            // 每30秒检查一次状态
            setInterval(checkAllStatus, 30000);
        });
    </script>
</body>
</html>
