# 生产环境 Docker Compose 配置
services:
  # Nginx (前端)
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stock-analysis-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - stock-analysis-network
    restart: unless-stopped

  # Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-analysis-backend
    environment:
      - ENVIRONMENT=production
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DATABASE=stock_analysis
      - DATABASE_NAME=stock_analysis
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-this-is-a-production-secret-key-must-be-at-least-32-characters-long}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - LOG_LEVEL=INFO
      - DATA_SOURCE_RATE_LIMIT_WINDOW=60
      - DATA_SOURCE_RATE_LIMIT_MAX_REQUESTS=1
      - DATA_SOURCE_MAX_FAILURES=3
      - DATA_SOURCE_HEALTH_CHECK_INTERVAL=300
      - MONGODB_BULK_WRITE_BATCH_SIZE=1000
      - TZ=Asia/Shanghai
    depends_on:
      - mongodb
      - redis
    networks:
      - stock-analysis-network
    restart: unless-stopped

  # MongoDB
  mongodb:
    image: mongo:7
    container_name: stock-analysis-mongodb
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init:/docker-entrypoint-initdb.d:ro
    environment:
      - MONGO_INITDB_DATABASE=stock_analysis
      - TZ=Asia/Shanghai
    networks:
      - stock-analysis-network
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: stock-analysis-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    environment:
      - TZ=Asia/Shanghai
    networks:
      - stock-analysis-network
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:

networks:
  stock-analysis-network:
    driver: bridge
